<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NeuroSense AI Enterprise</title>
    <!-- Tailwind via CDN for quick enterprise styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Decorative background elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/20 blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-emerald-600/20 blur-[100px]"></div>
    
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl shadow-2xl w-full max-w-md z-10">
        <div class="text-center mb-10">
            <i class="fas fa-brain text-indigo-400 text-5xl mb-4 drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]"></i>
            <h1 class="text-3xl font-bold text-white tracking-tight">NeuroSense</h1>
            <p class="text-indigo-200 font-medium text-sm mt-1 uppercase tracking-widest">Enterprise Edition</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Clinical Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-slate-400"></i>
                    </div>
                    <input type="email" id="email" value="doctor@neurosense.com" class="block w-full pl-10 pr-3 py-3 border border-slate-600 rounded-lg bg-slate-800/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all" required>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2 whitespace-nowrap overflow-hidden text-ellipsis">Secure Password <span class="text-xs text-slate-400 float-right mt-0.5">(Hint: doctor123)</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" id="password" value="doctor123" class="block w-full pl-10 pr-3 py-3 border border-slate-600 rounded-lg bg-slate-800/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all" required>
                </div>
            </div>
            
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-600 rounded bg-slate-800">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-300">Remember me</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-indigo-400 hover:text-indigo-300">Forgot password?</a>
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-slate-900 transition-all">
                <i class="fas fa-shield-alt mr-2"></i> Secure Login
            </button>
        </form>
        
        <div id="errorBox" class="mt-4 p-3 bg-rose-500/20 border border-rose-500/50 rounded-lg text-rose-200 text-sm hidden text-center"></div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('errorBox');
            
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Authenticating...';
            btn.disabled = true;
            errorBox.classList.add('hidden');
            
            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    btn.innerHTML = '<i class="fas fa-check mr-2"></i> Success!';
                    btn.classList.replace('bg-indigo-600', 'bg-emerald-600');
                    btn.classList.replace('hover:bg-indigo-700', 'hover:bg-emerald-700');
                    setTimeout(() => window.location.href = '/', 600);
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                errorBox.textContent = err.message || 'Connection error';
                errorBox.classList.remove('hidden');
                btn.innerHTML = '<i class="fas fa-shield-alt mr-2"></i> Secure Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
